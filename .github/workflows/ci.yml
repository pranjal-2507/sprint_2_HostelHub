name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend CI (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Rust Check
        run: cargo check
        working-directory: backend
      - name: Rust Test
        run: cargo test
        working-directory: backend

  frontend-test:
    name: Frontend CI (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend
      - name: Angular Build
        run: npm run build
        working-directory: frontend
      - name: Angular Test (Headless)
        run: npx ng test --no-watch --no-progress --browsers=ChromeHeadless
        working-directory: frontend

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Compose
        run: |
          cp backend/.env.example backend/.env || touch backend/.env
          docker compose build
